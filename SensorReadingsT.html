<!DOCTYPE html>
<html lang="en">

<!-- Sensor Reading Template -->

<head>
    <meta charset="utf-8">
    <title>Hill House sensors</title>
    <script type="text/javascript" src="d3.v7.min.js"></script>
    <!-- https://d3js.org/d3.v7.min.js-->
    <style>
        .currReadingValue {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            color: blue;
            text-align: center;
        }
        .chartTitle {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            color: blue;
            text-align: left;
        }
        .trendTitle {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            color: blue;
            text-align: left;
        }
        .currDTValue {
            font-family: sans-serif;
            font-weight: normal;
            font-size: medium;
            color: black;
        }
        .titleTable {
            padding-left: 20px;
            padding-right: 20px;
        }
        table.baroTrends {
            table-layout: fixed;
            width: 100%;
        }
    </style>
</head>

<body>
    <script>
        // These vars are available globally
        var ReadingDate = "_ReadingDate"; // "_ReadingDate" 2013-05-05";
        var ReadingTime = "_ReadingTime"; // "_ReadingTime" "00:45";
        var CurrTempF = Number("_CurrTempF"); // "_CurrTempF" 29
        var CurrTempC = Number("_CurrTempC"); // "_CurrTempC" 1
        var CurrHumidity = Number("_CurrHumidity"); // "_CurrHumidity" 33
        var CurrBaro = Number("_CurrBaro"); // "_CurrBaro" 27.00
    </script>
    <!-- Div for title section -->
    <div id="TitleDiv">
        <table>
            <tr>
                <td class="titleTable">
                    <span id="ReadingDate" class="currDTValue"> </span>
                    <script>
                        document.getElementById("ReadingDate").innerText = ReadingDate;
                    </script>
                    <br />
                    <span id="ReadingTime" class="currDTValue"> </span>
                    <script>
                        document.getElementById("ReadingTime").innerText = ReadingTime;
                    </script>
                </td>
                <td>
                    <span id="CurrTempF" class="currReadingValue"></span>
                    <script>
                        document.getElementById("CurrTempF").innerText = CurrTempF.toString() + "F";
                    </script>
                </td>
                <td class="titleTable">
                    <span id="CurrTempC" class="currReadingValue"></span>
                    <script>
                        document.getElementById("CurrTempC").textContent = CurrTempC.toString() + "C";
                    </script>
                </td>
                <td class="titleTable">
                    <span id="CurrHumidity" class="currReadingValue"></span>
                    <script>
                        document.getElementById("CurrHumidity").textContent = CurrHumidity.toString() + "% humidity";
                    </script>
                </td>
                <td class="titleTable">
                    <span id="CurrBaro" class="currReadingValue"></span>
                    <script>
                        document.getElementById("CurrBaro").textContent = CurrBaro.toString() + " inches";
                    </script>
                </td>
            </tr>
        </table>
    </div>

    <!-- Create divs to contain the charts -->
    <table>
        <tr>
            <td>
                <p class="chartTitle">_UpDownTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="UpDownChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="chartTitle">_TempTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="TemperatureChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="chartTitle">_HumidityTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="HumidityChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="chartTitle">_BaroTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="BaroChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="chartTitle">Barometric Pressure Trends</p>
            </td>
        </tr>
        <tr>
            <td>
                <table class="baroTrends">
                    <tr>
                        <td>
                            <p class="trendTitle">2 hours/readings</p>
                            <div id="Baro2TrendDiv"></div>
                        </td>
                        <td>
                            <p class="trendTitle">6 hours/readings</p>
                            <div id="Baro6TrendDiv"></div>
                        </td>
                        <td>
                            <p class="trendTitle">12 hours/readings</p>
                            <div id="Baro12TrendDiv"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <script type="text/javascript" src="Charts.js"></script>
    <script>
        // upDownTimeData is CSV string eg 2013-04-28 01:00,0
        // DTs look like 2013-04-28 01:00
        // WasOff is 0 or 1
        // 
        var upDownTimeData =
            `DT,WasOff
            _UpDownTimeValues
            `;

        // tempHumidityData is CSV string eg 2013-04-28 01:00,43,75,0,0
        // DTs look like 2013-04-28 01:00
        // Temperature looks like 43
        // Humidity looks like 75
        // WasOff is 0 or 1
        // 
        var tempHumidityData =
            `DT,Temperature,Humidity,WasOff
            _TempHumidityValues
            `;

        // baroData is CSV string eg 2013-04-28 01:00,43,2776,0
        // DTs look like 2013-04-28 01:00
        // Temperature looks like 43
        // Baro looks like 2775 (27.75 inches)
        // WasOff is 0 or 1
        // 
        var baroData =
            `DT,Temperature,Baro,WasOff
            _BaroValues
            `;

        Charts("#UpDownChartDiv", "#TemperatureChartDiv", "#HumidityChartDiv"
            , "#BaroChartDiv", "#Baro2TrendDiv", "#Baro6TrendDiv", "#Baro12TrendDiv"
            , upDownTimeData, tempHumidityData, baroData
        );
    </script>
</body>

</html>
