<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Hill House sensors</title>
    <script type="text/javascript" src="d3.v7.min.js"></script>
    <!-- https://d3js.org/d3.v7.min.js-->
    <style>
        .currReadingValue {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            color: blue;
            text-align: center;
        }
        .currDTValue {
            font-family: sans-serif;
            font-weight: normal;
            font-size: medium;
            color: black;
        }
        .titleTable {
            padding-left: 20px;
            padding-right: 20px;
        }
    </style>
</head>

<body>
    <!-- Div for title section -->
    <div id="TitleDiv">
        <table>
            <tr>
                <td class="titleTable">
                    <span class="currDTValue">
                        _ReadingDate
                    </span>
                    <br />
                    <span class="currDTValue">
                        _ReadingTime
                    </span>
                </td>
                <td>
                    <span class="currReadingValue">_CurrTempF</span>
                </td>
                <td class="titleTable">
                    <span class="currReadingValue">_CurrTempC</span>
                </td>
                <td class="titleTable">
                    <span class="currReadingValue">_CurrHumidity humidity</span>
                </td>
                <td class="titleTable">
                    <span class="currReadingValue">_CurrBaro</span>
                </td>
            </tr>
        </table>
    </div>

    <!-- Create divs to contain the charts -->
    <table>
        <tr>
            <td>
                <p class="currReadingValue">_UpDownTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="UpDownChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="currReadingValue">_TempTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="TemperatureChartDiv"></div>
            </td>
        </tr>
        <tr>
            <td>
                <p class="currReadingValue">_HumidityTitle</p>
            </td>
        </tr>
        <tr>
            <td>
                <div id="HumidityChartDiv"></div>
            </td>
        </tr>
    </table>
    <script type="text/javascript" src="Charts.js"></script>
    <script>
        // upDownTimeData is CSV string eg 2013-04-28 01:00,0
        // DTs look like 2013-04-28 01:00
        // WasOff is 0 or 1
        var upDownTimeData =
            `DT,WasOff
_UpDownTimeValues
`;

        // tempHumidityData is CSV string eg 2013-04-28 01:00,43,75,0
        // DTs look like 2013-04-28 01:00
        // Temperature looks like 43
        // Humidity looks like 75
        // WasOff is 0 or 1
        var tempHumidityData =
            `DT,Temperature,Humidity,Baro,WasOff
_TempHumidityValues
`;
        Charts("#UpDownChartDiv", "#TemperatureChartDiv", "#HumidityChartDiv", upDownTimeData, tempHumidityData);
    </script>
</body>

</html>
